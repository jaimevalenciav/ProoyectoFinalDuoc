server:
  port: 8081

spring:
  application:
    name: bff-movil
  datasource:
    url: jdbc:oracle:thin:@${ORACLE_TNS_NAME}?TNS_ADMIN=${ORACLE_WALLET_PATH}
    username: ${ORACLE_USUARIO}
    password: ${ORACLE_CLAVE}
    driver-class-name: oracle.jdbc.OracleDriver
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.OracleDialect
        default_schema: ${ORACLE_ESQUEMA:FLEETMANAGER}
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: https://${AZURE_B2C_TENANT}.b2clogin.com/${AZURE_B2C_TENANT}.onmicrosoft.com/v2.0/
          jwk-set-uri: https://${AZURE_B2C_TENANT}.b2clogin.com/${AZURE_B2C_TENANT}.onmicrosoft.com/discovery/v2.0/keys?p=B2C_1_susi

azure:
  bus-servicio:
    cadena-conexion: ${AZURE_BUS_SERVICIO_CONEXION}
    nombre-cola: pistas-gps

ms:
  vehiculos:
    url: http://${MS_VEHICULOS_HOST:localhost}:8082/api/v1
