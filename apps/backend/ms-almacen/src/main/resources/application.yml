server:
  port: 8085

spring:
  application:
    name: ms-almacen
  datasource:
    url: jdbc:oracle:thin:@${ORACLE_TNS_NAME}?TNS_ADMIN=${ORACLE_WALLET_PATH}
    username: ${ORACLE_USUARIO}
    password: ${ORACLE_CLAVE}
    driver-class-name: oracle.jdbc.OracleDriver
    hikari:
      maximum-pool-size: 2
      minimum-idle: 1
      connection-test-query: SELECT 1 FROM DUAL
      keepalive-time: 30000
      validation-timeout: 5000
      connection-timeout: 30000
      idle-timeout: 120000
  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        dialect: org.hibernate.dialect.OracleDialect
        default_schema: ${ORACLE_ESQUEMA:ADMIN}
    show-sql: false
  security:
    oauth2:
      resourceserver:
        jwt:
          jwk-set-uri: https://trackmanager.b2clogin.com/trackmanager.onmicrosoft.com/discovery/v2.0/keys?p=B2C_1_susi

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
